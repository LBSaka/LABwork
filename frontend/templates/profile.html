<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile / Settings - LABwork</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/account.js" defer></script>
    <script src="/static/profile.js" defer></script>
</head>

<body>
    <header class="appNav">
        <div class="appNavBrand">
            <a href="/">LABwork</a>
        </div>

        <nav class="appNavLinks">
            <a href="/">Landing</a>
            <a href="/applications.html">Applications</a>
            <a href="/profile.html">Profile / Settings</a>
        </nav>

        <div class="appNavAccount">
            <span id="currentUserDisplay">Checking login...</span>
            <button id="logoutButton" type="button">Logout</button>
        </div>
    </header>

    <main class="profileDisplay">
        <h1>Profile / Settings</h1>

        <section>
            <h2>Account</h2>
            <p><strong>Username:</strong> <span id="profileUsername">Loading...</span></p>
        </section>

        <hr>

        <section>
            <h2>Settings</h2>

            <form id="settingsForm">
                <label for="languageSetting">Language</label>
                <select id="languageSetting">
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>

                <label for="themeSetting">Theme</label>
                <select id="themeSetting">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>

                <button type="submit">Save Settings</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Danger Zone</h2>
            <p>Delete your account and all saved applications. This will be permanent.</p>
            <button id="deleteAccountButton" type="button">Delete Account</button>
        </section>
    </main>
</body>
</html>
